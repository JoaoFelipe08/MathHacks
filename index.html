<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Football Predictor</title>
    <style>
        /* BASE PAGE */
        body {
            font-family: 'Courier New', monospace;
            background-color:white;
            color: black;
            margin: 0;
            padding: 50px 0;
            display: flex;
            justify-content: center;
        }

        /* CARD CONTAINER */
        .card {
            background-color: lightgray;
            border: 1px solid gray;
            border-radius: 8px;
            width: 450px;
            padding: 25px;
        }

        h1, h2 {
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
        }

        h2 {
            font-size: 18px;
            border-bottom: 1px solid gray;
            padding-bottom: 5px;
        }

        /* LABELS & INPUTS */
        label {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: white;
            border: 1px solid gray;
            border-radius: 4px;
            color: black;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: black;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 10px;
            margin-top: 25px;
            border: none;
            border-radius: 4px;
            background-color: white;
            color: black;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            border: 1px solid black;
        }

        button:hover {
            background-color: white;
        }

        /* RESULTS */
        .results {
            margin-top: 20px;
        }

        .player {
            background-color: white;
            border-left: 3px solid black;
            padding: 10px;
            margin-top: 8px;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="card">
    <h1>Fantasy Football Predictor</h1>

    <h2>League Details</h2>

    <label for="leagueSize">League Size</label>
    <input type="number" id="leagueSize" placeholder="e.g., 12">

    <label for="currentRound">Current Round</label>
    <input type="number" id="currentRound" placeholder="e.g., 3">

    <label for="draftPosition">Draft Position</label>
    <input type="number" id="draftPosition" placeholder="e.g., 5">

    <button onclick="predict()">Predict Best Picks</button>

    <div class="results" id="results"></div>
</div>

<script>
async function predict() {
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "Loading...";

    const leagueSize = document.getElementById("leagueSize").value;
    const draftType = document.getElementById("draftType").value;
    const currentRound = document.getElementById("currentRound").value;
    const draftPosition = document.getElementById("draftPosition").value;

    // Mock Data for now
    const mockData = [
        { name: "Player A", score: 22.4 },
        { name: "Player B", score: 19.8 },
        { name: "Player C", score: 17.1 }
    ];

    resultsDiv.innerHTML = "";
    mockData.forEach(player => {
        const div = document.createElement("div");
        div.className = "player";
        div.innerHTML = `<strong>${player.name}</strong> - ${player.score} pts`;
        resultsDiv.appendChild(div);
    });

    console.log("League Details:", { leagueSize, draftType, currentRound, draftPosition });
}
</script>

</body>
</html>
